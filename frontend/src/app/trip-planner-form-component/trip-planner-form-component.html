<div class="card border-0 shadow-sm mx-auto my-4 bg-white" style="max-width: 550px;">
  <div class="card-header bg-transparent border-0 pt-4 px-4 pb-0">
    <h5 class="text-dark fw-bold mb-0">GZMTEC Trip Planner</h5>
    <p class="text-muted small mb-0">Pick your entry and destination point and time of search.</p>
  </div>

  <div class="card-body px-4 pt-3 pb-4">
    <form [formGroup]="searchForm" (ngSubmit)="onSubmit()" autocomplete="off">
      
      <div class="mb-3 position-relative">
        <label class="form-label text-uppercase text-muted fw-bold small" style="font-size: 0.75rem; letter-spacing: 0.5px;">
          Starting Point (A)
        </label>
        <input type="text" class="form-control form-control-sm" placeholder="Enter the starting stop name..." formControlName="fromStopName"
               [class.is-invalid]="searchForm.get('fromStopName')?.touched && (searchForm.get('fromStopName')?.invalid || !selectedFromStop)">
        
        @if (filteredFromStops.length > 0) {
          <ul class="list-group position-absolute w-100 shadow bg-white" style="z-index: 1050; max-height: 220px; overflow-y: auto; margin-top: 2px;">
            @for (stop of filteredFromStops; track stop.id) {
              <button type="button" class="list-group-item list-group-item-action text-start py-2 px-3 small border-0" (click)="selectFromStop(stop)">
                <strong class="text-dark">{{ stop.name }}</strong> 
                <span class="text-muted text-uppercase ms-2" style="font-size: 0.7rem;">({{ stop.municipality }})</span>
              </button>
            }
          </ul>
        }
      </div>

      <div class="mb-3 position-relative">
        <label class="form-label text-uppercase text-muted fw-bold small" style="font-size: 0.75rem; letter-spacing: 0.5px;">
          Destination Point (B)
        </label>
        <input type="text" class="form-control form-control-sm" placeholder="Enter the destination stop name..." formControlName="toStopName"
               [class.is-invalid]="searchForm.get('toStopName')?.touched && (searchForm.get('toStopName')?.invalid || !selectedToStop)">
        
        @if (filteredToStops.length > 0) {
          <ul class="list-group position-absolute w-100 shadow bg-white" style="z-index: 1050; max-height: 220px; overflow-y: auto; margin-top: 2px;">
            @for (stop of filteredToStops; track stop.id) {
              <button type="button" class="list-group-item list-group-item-action text-start py-2 px-3 small border-0" (click)="selectToStop(stop)">
                <strong class="text-dark">{{ stop.name }}</strong> 
                <span class="text-muted text-uppercase ms-2" style="font-size: 0.7rem;">({{ stop.municipality }})</span>
              </button>
            }
          </ul>
        }
      </div>

      <div class="row g-2 mb-4">
        <div class="col-7">
          <label class="form-label text-uppercase text-muted fw-bold small" style="font-size: 0.75rem; letter-spacing: 0.5px;">Date</label>
          <input type="date" class="form-control form-control-sm" formControlName="date"
                 [class.is-invalid]="searchForm.get('date')?.touched && searchForm.get('date')?.invalid">
        </div>
        <div class="col-5">
          <label class="form-label text-uppercase text-muted fw-bold small" style="font-size: 0.75rem; letter-spacing: 0.5px;">Time</label>
          <input type="time" class="form-control form-control-sm" formControlName="time"
                 [class.is-invalid]="searchForm.get('time')?.touched && searchForm.get('time')?.invalid">
        </div>
      </div>

      <button type="submit" class="btn btn-dark w-100 fw-bold py-2 shadow-sm" style="font-size: 0.9rem;" [disabled]="!selectedFromStop || !selectedToStop">
        Find Connection
      </button>

    </form>
  </div>
</div>
