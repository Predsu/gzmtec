<div class="card border-0 shadow-sm mx-auto my-4 bg-white" style="max-width: 550px;">
  <div class="card-header bg-transparent border-0 pt-4 px-4 pb-0">
    <h5 class="text-dark fw-bold mb-0">Planer Podróży</h5>
    <p class="text-muted small mb-0">Wprowadź współrzędne i czas, aby wyznaczyć trasę z predykcją GZM.</p>
  </div>

  <div class="card-body px-4 pt-3 pb-4">
    <form [formGroup]="searchForm" (ngSubmit)="onSubmit()">
      
      <div class="mb-3">
        <label class="form-label text-uppercase text-muted fw-bold small" style="font-size: 0.75rem; letter-spacing: 0.5px;">
          Punkt startowy (A)
        </label>
        <div class="row g-2">
          <div class="col">
            <input type="number" step="any" class="form-control form-control-sm" placeholder="Szerokość (Lat)" formControlName="fromLat"
                   [class.is-invalid]="searchForm.get('fromLat')?.touched && searchForm.get('fromLat')?.invalid">
          </div>
          <div class="col">
            <input type="number" step="any" class="form-control form-control-sm" placeholder="Długość (Lon)" formControlName="fromLon"
                   [class.is-invalid]="searchForm.get('fromLon')?.touched && searchForm.get('fromLon')?.invalid">
          </div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label text-uppercase text-muted fw-bold small" style="font-size: 0.75rem; letter-spacing: 0.5px;">
          Miejsce docelowe (B)
        </label>
        <div class="row g-2">
          <div class="col">
            <input type="number" step="any" class="form-control form-control-sm" placeholder="Szerokość (Lat)" formControlName="toLat"
                   [class.is-invalid]="searchForm.get('toLat')?.touched && searchForm.get('toLat')?.invalid">
          </div>
          <div class="col">
            <input type="number" step="any" class="form-control form-control-sm" placeholder="Długość (Lon)" formControlName="toLon"
                   [class.is-invalid]="searchForm.get('toLon')?.touched && searchForm.get('toLon')?.invalid">
          </div>
        </div>
      </div>

      <div class="row g-2 mb-4">
        <div class="col-7">
          <label class="form-label text-uppercase text-muted fw-bold small" style="font-size: 0.75rem; letter-spacing: 0.5px;">Data</label>
          <input type="date" class="form-control form-control-sm" formControlName="date"
                 [class.is-invalid]="searchForm.get('date')?.touched && searchForm.get('date')?.invalid">
        </div>
        <div class="col-5">
          <label class="form-label text-uppercase text-muted fw-bold small" style="font-size: 0.75rem; letter-spacing: 0.5px;">Godzina</label>
          <input type="time" class="form-control form-control-sm" formControlName="time"
                 [class.is-invalid]="searchForm.get('time')?.touched && searchForm.get('time')?.invalid">
        </div>
      </div>

      <button type="submit" class="btn btn-dark w-100 fw-bold py-2 shadow-sm" style="font-size: 0.9rem;">
        Znajdź połączenie
      </button>

    </form>
  </div>
</div>
